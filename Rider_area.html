<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rider Area Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <div class="sticky top-0 z-20 bg-white shadow-sm border-b border-gray-200">
        <div class="p-3 max-w-[1600px] mx-auto">
            <div class="flex flex-col md:flex-row items-stretch md:items-center justify-between gap-3">
                <div class="flex items-center justify-between">
                    <h1 class="text-lg font-black text-blue-900 tracking-tighter uppercase italic">Logistics Hub</h1>
                    <span id="recordCount" class="md:hidden text-[10px] font-bold bg-blue-50 text-blue-600 px-2 py-1 rounded-lg">0 Areas</span>
                </div>

                <div class="flex flex-1 max-w-2xl gap-2">
                    <div class="relative flex-grow">
                        <input type="text" id="searchInput" placeholder="Search Town, Rider, or ID..." 
                            class="w-full p-2.5 pl-9 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm"
                            onkeyup="render()">
                        <svg class="w-4 h-4 absolute left-3 top-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </div>

                    <select id="sortFilter" onchange="render()" 
                        class="bg-gray-50 border border-gray-200 text-gray-700 text-xs font-bold rounded-xl px-3 outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="All">All Areas</option>
                        <option value="Lower">Lower Only</option>
                        <option value="Upper">Upper Only</option>
                        <option value="SD">SD / Others</option>
                    </select>
                </div>
                
                <span id="recordCountDesktop" class="hidden md:block text-xs font-bold bg-blue-50 text-blue-600 px-3 py-1.5 rounded-lg border border-blue-100">
                    0 Total Records
                </span>
            </div>
        </div>
    </div>

    <div class="p-3 max-w-[1600px] mx-auto">
        <div id="cardGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-3">
            </div>
        
        <div id="noResults" class="hidden text-center py-24">
            <p class="text-gray-400 italic text-sm">No matching areas found.</p>
        </div>
    </div>

    <script>
        let fullData = [];

        async function loadData() {
            try {
                const response = await fetch('RIDER AREA 2.xlsx');
                const arrayBuffer = await response.arrayBuffer();
                const data = new Uint8Array(arrayBuffer);
                const workbook = XLSX.read(data, { type: 'array' });
                fullData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                render();
            } catch (e) {
                console.error(e);
                document.getElementById('cardGrid').innerHTML = `
                    <div class='col-span-full text-center p-12 bg-white rounded-2xl border border-dashed border-gray-300'>
                        <p class='text-red-500 font-bold'>RIDER AREA 2.xlsx Not Found</p>
                        <p class='text-xs text-gray-400 mt-1'>Please ensure the file is in the same folder.</p>
                    </div>`;
            }
        }

        function render() {
            const container = document.getElementById('cardGrid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filter = document.getElementById('sortFilter').value;
            container.innerHTML = '';

            const filtered = fullData.filter(row => {
                const zoneDesc = String(row['ZONE'] || '').toLowerCase();
                
                // Categorization Logic
                let category = 'SD';
                if (zoneDesc.includes('lower')) category = 'Lower';
                else if (zoneDesc.includes('upper')) category = 'Upper';

                const matchesFilter = (filter === 'All' || category === filter);
                
                const matchesSearch = !search || 
                    String(row['ZONE ID']).toLowerCase().includes(search) || 
                    String(row['TOWN']).toLowerCase().includes(search) || 
                    String(row['DRIVER']).toLowerCase().includes(search);

                return matchesFilter && matchesSearch;
            });

            // Update Counts
            document.getElementById('recordCount').innerText = `${filtered.length} Areas`;
            document.getElementById('recordCountDesktop').innerText = `${filtered.length} Total Records`;

            filtered.forEach((row, index) => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col hover:border-blue-400 transition-all h-full";
                card.innerHTML = `
                    <div class="p-3 flex-grow">
                        <p class="text-[9px] font-bold text-gray-400 uppercase mb-1 truncate tracking-wider">${row['TOWN'] || '---'}</p>
                        
                        <div class="bg-blue-600 text-white text-center py-2.5 rounded-lg shadow-sm mb-3">
                            <span class="text-sm font-black tracking-tighter">${row['ZONE ID'] || 'N/A'}</span>
                        </div>
                        
                        <div class="text-center px-1">
                            <p class="text-[9px] text-gray-400 uppercase font-bold mb-0.5">Assigned Rider</p>
                            <h3 class="text-[11px] font-extrabold text-gray-800 leading-tight uppercase">
                                ${row['DRIVER'] || 'NOT ASSIGNED'}
                            </h3>
                        </div>
                    </div>
                    
                    <div class="border-t border-gray-100 bg-gray-50/30 p-2">
                        <button onclick="toggleDetail(${index})" class="text-[9px] font-black text-blue-500 hover:text-blue-700 flex items-center justify-center w-full uppercase tracking-tighter">
                            View Details ▾
                        </button>
                        <div id="detail-${index}" class="hidden mt-2 text-[10px] text-gray-500 bg-white p-2.5 rounded-lg border border-gray-100 shadow-inner leading-relaxed">
                            <div class="flex items-center gap-1 mb-1">
                                <span class="w-1.5 h-1.5 rounded-full bg-blue-400"></span>
                                <span class="font-bold text-blue-900 uppercase text-[9px]">Zone Description</span>
                            </div>
                            ${row['ZONE'] || 'No additional details available.'}
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });

            document.getElementById('noResults').classList.toggle('hidden', filtered.length > 0);
        }

        function toggleDetail(id) {
            const el = document.getElementById(`detail-${id}`);
            el.classList.toggle('hidden');
        }

        loadData();
    </script>
</body>
</html>
